<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrofuturo Interativo | Semente do Amanhã</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">Agro<span>Futuro</span></div>
            <ul>
                <li><a href="#">Inovação</a></li>
                <li><a href="#">Planeta</a></li>
                <li><a href="#">Colheita</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-text">
                <h1>Semeando Tecnologia</h1>
                <p>Clique na árvore para descobrir o que a tecnologia pode colher para o nosso planeta!</p>
            </div>

            <div class="stage">
                <div class="clouds">
                    <div class="cloud c1"></div>
                    <div class="cloud c2"></div>
                </div>
                
                <div class="tree-container" id="tree-area">
                    <div class="apple" id="apple"></div>
                    <div class="tree-top">
                        <div class="leaf l1"></div>
                        <div class="leaf l2"></div>
                        <div class="leaf l3"></div>
                    </div>
                    <div class="trunk"></div>
                </div>
                <div class="ground"></div>
            </div>
        </section>

        <div id="info-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn">&times;</span>
                <h2 id="fact-title">Inovação Desbloqueada!</h2>
                <p id="fact-text">A tecnologia no campo ajuda a economizar 40% de água!</p>
                <button class="btn-reset" onclick="resetApp()">Plantar Novamente</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
